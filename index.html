<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Загрузка...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
        }
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hidden {
            display: none;
        }
        .innocent {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            padding: 20px;
        }
        .innocent h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .innocent p {
            font-size: 14px;
            opacity: 0.6;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #ff3366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .pulse {
            animation: pulse 1s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .scare-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }
        .scare-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scare-overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: red;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            font-family: monospace;
            animation: blink 0.3s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<!-- ЭКРАН 1: НЕВИННЫЙ -->
<div id="innocentScreen" class="screen innocent">
    <div>
        <div class="loader"></div>
        <h1>⚡ ИНИЦИАЛИЗАЦИЯ ⚡</h1>
        <p class="pulse">Подключение к защищённому каналу...</p>
        <p style="font-size: 10px; margin-top: 30px;">v4.3 | secure tunnel</p>
    </div>
</div>

<!-- ЭКРАН 2: СКРИМЕР -->
<div id="scareScreen" class="screen hidden">
    <div class="scare-container">
        <img id="scareImage" class="scare-img" alt="">
        <div class="scare-overlay">⚠️ СИСТЕМА СКОМПРОМЕТИРОВАНА ⚠️</div>
    </div>
</div>
